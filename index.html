<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITAB Criminal Profile Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="src/global/base.css">
    <link rel="stylesheet" type="text/css" href="src/global/navbar.css">
    <link rel="stylesheet" type="text/css" href="src/index/search.css">
    <link rel="stylesheet" type="text/css" href="src/index/characterProfiles.css">
    <link rel="stylesheet" type="text/css" href="src/global/footer.css">
</head>
<body>
    <main>
        <header id="home">
            <div class="blueBackground">
                <nav>
                    <div id="titleWrapper">
                        <a href="index.html"><img src="images/itab-logo.png" alt="Interdimensional Threat Analysis Bureau logo" class="itabLogo" loading="lazy"></a>
                        <h1>Interdimensional Threat Analysis Bureau</h1>
                        <button id="dropdownButton" type="button" aria-expanded="false" aria-controls="navList">☰</button>
                        <ul id="desktopNavList">
                            <li><a href="#home">Home</a></li>
                            <li><a href="#criminalProfiles">Cases</a></li>
                            <li><a href="#legal">Legal</a></li>
                        </ul>
                    </div>

                    <ul class="d-none" id="navList">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#criminalProfiles">Cases</a></li>
                        <li><a href="#legal">Legal</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <section id="criminalProfiles">
            <h2>Criminal Profiles</h2>
            <form id="searchBar">
                <label id="searchProfilesLabel" for="searchInput">Search Profiles</label>
                <input id="searchInput" name="search" placeholder="Search by name, or alias" type="text">
                <button type="submit" id="search">Search</button>
                <fieldset>
                    <legend>FILTER BY STATUS:</legend>
                    <select name="threatLevel" id="threatLevel">
                        <option value="all">All threat levels</option>
                        <option value="1">Low risk</option>
                        <option value="2">Moderate risk</option>
                        <option value="3">Severe threat</option>
                    </select>

                    <select name="status" id="status">
                        <option value="all">All status</option>
                        <option value="mostWanted">Most wanted</option>
                        <option value="captured">Captured</option>
                        <option value="underSurveillance">Under surveillance</option>
                    </select>
                </fieldset>
            </form>

            <div id="profileCards">
                
            </div>
        </section>
    </main>

    <footer id="legal">
        <a href="#" class="footerLinks">PRIVACY POLICY</a>
        <a href="#" class="footerLinks">TERMS OF USE</a>
        <a href="#home" class="footerLinks">BACK TO TOP</a>

        <p><small id="copyrightTag">&copy; iTab 2026</small></p>
    </footer>

    <script src="src/global/hamburgerMenu.js"></script>
    <script type="module" src="src/index/loadCharacters.js"></script>
</body>
</html>
